<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://use.typekit.net/qjo7ols.css">
  <link rel="stylesheet" href="index.css">

  <!-- shared data FIRST -->
  <script src="data.js"></script>

  <!-- main grid logic -->
  <script src="script.js" defer></script>

  <title>Isabel Y. Lee</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.png">
</head>

<body>

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="top-bar-inner">
  
      <div class="logo">IYL</div>
  
      <span class="dot"></span>
  
    </div>
  </header>

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="bio">
        I’m Isabel, a multidisciplinary designer based in New York and the Bay Area, <br>
        passionate about the intersection of food and design.

        <div class="contact">
          <a href="mailto:izzylee7@icloud.com">izzylee7@icloud.com</a> | 
          <a href="https://www.instagram.com/iyl.ee_/" target="_blank">@iyl.ee_</a>
        </div>
      </div>

      <div class="copyright">
        © IYL. All Rights Reserved. 2025
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button data-filter="all" class="active">All</button>
    <button data-filter="photo">Photos</button>
    <button data-filter="illustration">Illustrations</button>
    <button data-filter="design">Design</button>
  </div>

  <!-- GRID -->
  <div class="grid" id="work-container"></div>

</body>
</html>
